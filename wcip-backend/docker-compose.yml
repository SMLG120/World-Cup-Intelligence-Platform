services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wcip}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in wcip-backend/.env}
      POSTGRES_DB: ${POSTGRES_DB:-wcip}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wcip"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "6379:6379"

  api:
    build: .
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-World Cup Intelligence Platform}
      DEBUG: ${DEBUG:-false}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-wcip}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in wcip-backend/.env}@db:5432/${POSTGRES_DB:-wcip}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in wcip-backend/.env}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:?Set JWT_REFRESH_SECRET_KEY in wcip-backend/.env}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      FIFA_RANKING_SOURCE_URL: ${FIFA_RANKING_SOURCE_URL:-https://inside.fifa.com/fifa-world-ranking/men}
      ELO_RATING_SOURCE_URL: ${ELO_RATING_SOURCE_URL:-https://www.eloratings.net/2026_World_Cup}
      ELO_RATING_TSV_URL: ${ELO_RATING_TSV_URL:-https://www.eloratings.net/World.tsv}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"

  worker:
    build: .
    environment:
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-wcip}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in wcip-backend/.env}@db:5432/${POSTGRES_DB:-wcip}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in wcip-backend/.env}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:?Set JWT_REFRESH_SECRET_KEY in wcip-backend/.env}
      FIFA_RANKING_SOURCE_URL: ${FIFA_RANKING_SOURCE_URL:-https://inside.fifa.com/fifa-world-ranking/men}
      ELO_RATING_SOURCE_URL: ${ELO_RATING_SOURCE_URL:-https://www.eloratings.net/2026_World_Cup}
      ELO_RATING_TSV_URL: ${ELO_RATING_TSV_URL:-https://www.eloratings.net/World.tsv}
    depends_on:
      db: { condition: service_healthy }
      redis: { condition: service_healthy }
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info

  beat:
    build: .
    environment:
      APP_ENV: ${APP_ENV:-development}
      DEBUG: ${DEBUG:-false}
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in wcip-backend/.env}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:?Set JWT_REFRESH_SECRET_KEY in wcip-backend/.env}
      FIFA_RANKING_SOURCE_URL: ${FIFA_RANKING_SOURCE_URL:-https://inside.fifa.com/fifa-world-ranking/men}
      ELO_RATING_SOURCE_URL: ${ELO_RATING_SOURCE_URL:-https://www.eloratings.net/2026_World_Cup}
      ELO_RATING_TSV_URL: ${ELO_RATING_TSV_URL:-https://www.eloratings.net/World.tsv}
    depends_on:
      redis: { condition: service_healthy }
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=info

volumes:
  pgdata:
