# Render deployment blueprint.
# Create services from this file via the Render dashboard ("New > Blueprint").
services:
  - type: web
    name: wcip-api
    runtime: python
    rootDir: wcip-backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    plan: starter
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_REFRESH_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: DATABASE_URL
        fromDatabase:
          name: wcip-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: wcip-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: wcip-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: wcip-redis
          type: redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        value: https://world-cup-intelligence-platform.vercel.app,http://localhost:3000
      - key: BACKEND_CORS_ORIGINS
        value: https://world-cup-intelligence-platform.vercel.app
      - key: CORS_ORIGINS
        value: https://world-cup-intelligence-platform.vercel.app
      - key: BACKEND_CORS_ORIGIN_REGEX
        value: https://world-cup-intelligence-platform(?:-[a-z0-9-]+)?\.vercel\.app
      - key: FIFA_RANKING_SOURCE_URL
        value: https://inside.fifa.com/fifa-world-ranking/men
      - key: ELO_RATING_SOURCE_URL
        value: https://www.eloratings.net/2026_World_Cup
      - key: ELO_RATING_TSV_URL
        value: https://www.eloratings.net/World.tsv
  - type: worker
    name: wcip-worker
    runtime: python
    rootDir: wcip-backend
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A app.workers.celery_app.celery_app worker --loglevel=info
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: SECRET_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_REFRESH_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: wcip-db
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: wcip-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: wcip-redis
          type: redis
          property: connectionString
      - key: FIFA_RANKING_SOURCE_URL
        value: https://inside.fifa.com/fifa-world-ranking/men
      - key: ELO_RATING_SOURCE_URL
        value: https://www.eloratings.net/2026_World_Cup
      - key: ELO_RATING_TSV_URL
        value: https://www.eloratings.net/World.tsv

  - type: redis
    name: wcip-redis
    plan: starter
    ipAllowList: []

databases:
  - name: wcip-db
    plan: starter
    postgresMajorVersion: "16"
